name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          python3 -m pip install -r requirements-dev.txt

      - run: make bootstrap
      - run: make lint

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq
          python3 -m pip install -r requirements-dev.txt

      - run: make bootstrap
      - name: Run unit and integration tests
        run: |
          bats test/unit
          bats test/integration

  generator-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq
          python3 -m pip install -r requirements-dev.txt

      - run: make bootstrap
      - name: Run generator tests (structure + Docker build + HTTP smoke)
        run: bats test/generators
