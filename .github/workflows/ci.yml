name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { submodules: recursive }
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: sudo apt-get update && sudo apt-get install -y shellcheck bats jq
      - run: python3 -m pip install -r requirements-dev.txt
      - run: make bootstrap
      - run: make lint

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { submodules: recursive }
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: sudo apt-get update && sudo apt-get install -y shellcheck bats jq
      - run: python3 -m pip install -r requirements-dev.txt
      - run: make bootstrap
      - name: Unit and integration tests
        run: bats test/unit && bats test/integration

  generator-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: { submodules: recursive }
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: sudo apt-get update && sudo apt-get install -y shellcheck bats jq
      - run: python3 -m pip install -r requirements-dev.txt
      - run: make bootstrap
      - name: Generator structure tests (no Docker)
        run: bats test/generators --filter-tags '!docker'

  smoke-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - gen: actix
            port: 8080
          - gen: axum
            port: 3000
          - gen: django
            port: 8000
          - gen: express
            port: 5000
          - gen: fastapi
            port: 8000
          - gen: go-fiber
            port: 3000
          - gen: go-net
            port: 8080
          - gen: nestjs
            port: 3000
          - gen: nextjs
            port: 3000
          - gen: rails
            port: 3000
          - gen: react
            port: 80
    name: smoke (${{ matrix.gen }})
    steps:
      - uses: actions/checkout@v5
        with: { submodules: recursive }
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: python3 -m pip install -r requirements-dev.txt
      - name: Build + HTTP 200 (${{ matrix.gen }})
        run: ./scripts/smoke-test-generator.sh ${{ matrix.gen }} ${{ matrix.port }}
